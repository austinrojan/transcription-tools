name: Release
on:
  push:
    tags: ["v*"]

jobs:
  test:
    strategy:
      matrix:
        os: [macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: sha256sum install.sh > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            checksums.txt
          generate_release_notes: true
